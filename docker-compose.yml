services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - PORT=5001
      # Points to your Windows host's local MongoDB (mongodb://localhost:27017/erp)
      - MONGODB_URI=mongodb://host.docker.internal:27017/erp
    ports:
      - "5001:5001"
    extra_hosts:
      - "host.docker.internal:host-gateway"  # ensures Linux Docker also works

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "4173:80"
    depends_on:
      - backend
