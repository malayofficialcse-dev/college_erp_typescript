apiVersion: apps/v1
kind: Deployment
metadata:
  name: erp-backend
  labels:
    app: erp-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: erp-backend
  template:
    metadata:
      labels:
        app: erp-backend
    spec:
      containers:
      - name: erp-backend
        # Replace <your-acr-name> with your actual Azure Container Registry name
        image: <your-acr-name>.azurecr.io/erp-backend:latest
        ports:
        - containerPort: 5001
        env:
        - name: PORT
          value: "5001"
        # Add your other environment variables here or use a ConfigMap/Secret
        # - name: DATABASE_URL
        #   valueFrom:
        #     secretKeyRef:
        #       name: erp-secrets
        #       key: database-url
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
