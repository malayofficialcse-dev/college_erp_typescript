name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to registry
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}
          registry: ${{ secrets.REGISTRY_HOST }}

      - name: Determine image tags
        shell: bash
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            IMAGE_TAG=${GITHUB_REF#refs/tags/}
          elif [[ "${GITHUB_REF}" == refs/heads/main ]]; then
            IMAGE_TAG=latest
          else
            BRANCH=${GITHUB_REF#refs/heads/}
            IMAGE_TAG=dev-${BRANCH//\//-}
          fi
          echo "SHORT_SHA=${SHORT_SHA}" >> $GITHUB_ENV
          echo "IMAGE_TAG=${IMAGE_TAG}" >> $GITHUB_ENV

      - name: Build and push backend image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.REGISTRY_NAMESPACE }}/college-erp-backend:${{ env.IMAGE_TAG }}
            ${{ secrets.REGISTRY_NAMESPACE }}/college-erp-backend:${{ env.SHORT_SHA }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ secrets.REGISTRY_NAMESPACE }}/college-erp-frontend:${{ env.IMAGE_TAG }}
            ${{ secrets.REGISTRY_NAMESPACE }}/college-erp-frontend:${{ env.SHORT_SHA }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        shell: bash
        run: |
          echo "$KUBE_CONFIG_DATA" | base64 --decode > kubeconfig
          export KUBECONFIG="$PWD/kubeconfig"
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG }}

      - name: Patch deployments with new images and apply manifests
        shell: bash
        run: |
          set -e
          IMAGE_SHA=${{ env.SHORT_SHA }}
          REG_NS=${{ secrets.REGISTRY_NAMESPACE }}

          kubectl --kubeconfig=kubeconfig set image deployment/frontend frontend=${REG_NS}/college-erp-frontend:${IMAGE_SHA} --namespace default || true
          kubectl --kubeconfig=kubeconfig set image deployment/backend backend=${REG_NS}/college-erp-backend:${IMAGE_SHA} --namespace default || true

          kubectl --kubeconfig=kubeconfig apply -f k8s/k8s-deploy.yaml
        env:
          SHORT_SHA: ${{ env.SHORT_SHA }} ",geerate the imagesof r this ]